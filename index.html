<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bali Villa Catalog — Client Shortlist</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=14" />
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="location.href='index.html'">
      <b>Bali Villa Catalog</b>
      <span data-i18n="shortlist">shortlist · compare · investment memo</span>
    </div>
    <nav class="nav">
      <button class="navLangBtn" data-lang="ru" onclick="setLang('ru')" type="button">RU</button>
      <button class="navLangBtn" data-lang="en" onclick="setLang('en')" type="button">EN</button>
      <a href="index.html" data-i18n="catalog">Каталог</a>
      <a href="calculator.html" data-i18n="finance">Финмодель</a>
      <a href="markets.html" data-i18n="markets">Рынки</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="hero no-print">
      <div>
        <h1 data-i18n="heroTitle">Клиентская витрина объектов</h1>
        <p data-i18n="heroText">Показывай клиенту только нужные проекты: варианты юнитов внутри проекта, ROI в 3 сценариях, юридическая структура, красные флаги и персональная подборка.</p>
      </div>
      <div class="heroActions">
        <button id="createShortlistBtn" class="primary" data-i18n="createLink">Создать ссылку для клиента</button>
        <a id="contactBtn" class="ghost" target="_blank" rel="noreferrer" data-i18n="contact">Связаться</a>
      </div>
    </section>

    <section id="shortlistPanel" class="shortlistPanel hidden no-print"></section>

    <section class="filters no-print">
      <div class="modeSwitch" aria-label="Client mode">
        <button data-mode="investment" class="on" data-i18n="investment">Инвестиции</button>
        <button data-mode="lifestyle" data-i18n="lifestyle">Для жизни</button>
        <button data-mode="mixed" data-i18n="mixed">Смешанный</button>
      </div>

      <div class="filterGrid">
        <label><span data-i18n="location">Локация</span>
          <select id="locationFilter"><option value="" data-i18n="all">Все</option></select>
        </label>
        <label><span data-i18n="type">Тип</span>
          <select id="typeFilter"><option value="" data-i18n="all">Все</option></select>
        </label>
        <label><span data-i18n="budgetTo">Бюджет до</span>
          <select id="budgetFilter">
            <option value="" data-i18n="any">Любой</option>
            <option value="200000">$200k</option>
            <option value="350000">$350k</option>
            <option value="500000">$500k</option>
            <option value="750000">$750k</option>
          </select>
        </label>
        <label><span data-i18n="status">Статус</span>
          <select id="statusFilter">
            <option value="active" data-i18n="active">Актуальные</option>
            <option value="Available" data-i18n="statusAvailable">Доступно</option>
            <option value="Reserved" data-i18n="statusReserved">В брони</option>
            <option value="archive" data-i18n="archived">Архив / Sold / Draft</option>
            <option value="all" data-i18n="allStatuses">Все статусы</option>
          </select>
        </label>
        <label><span data-i18n="sort">Сортировка</span>
          <select id="sortSelect">
            <option value="score" data-i18n="byScore">По рейтингу</option>
            <option value="priceAsc" data-i18n="priceUp">Цена ↑</option>
            <option value="roiDesc" data-i18n="roiDown">Conservative ROI ↓</option>
            <option value="legalDesc" data-i18n="legalDown">Legal score ↓</option>
          </select>
        </label>
      </div>
      <div class="metaLine"><span id="resultCount"></span><button id="resetBtn" class="linkBtn" data-i18n="reset">Сбросить</button></div>
    </section>

    <section id="app"></section>
  </main>

  <div id="compareBar" class="compareBar hidden no-print">
    <span id="compareCount"></span>
    <button id="compareBtn" data-i18n="compare">Сравнить</button>
    <button id="clearCompareBtn" class="mutedBtn" data-i18n="clear">Очистить</button>
  </div>

  <script src="assets/js/i18n.js?v=14"></script>
  <script src="assets/js/config.js?v=14"></script>
  <script src="assets/js/data.js?v=14"></script>
  <script src="assets/js/scoring.js?v=14"></script>
  <script src="assets/js/app.js?v=14"></script>
</body>
</html>
