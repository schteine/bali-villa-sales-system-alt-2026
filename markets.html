<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Comparison — Bali / Dubai / Phuket / Batumi</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=15" />
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="location.href='index.html'">
      <b>Bali Villa Catalog</b>
      <span data-i18n="marketBrand">market comparison</span>
    </div>
    <nav class="nav">
      <button class="navLangBtn" data-lang="ru" onclick="setLang('ru')" type="button">RU</button>
      <button class="navLangBtn" data-lang="en" onclick="setLang('en')" type="button">EN</button>
      <a href="index.html" data-i18n="catalog">Каталог</a>
      <a href="calculator.html" data-i18n="finance">Финмодель</a>
      <a href="markets.html" data-i18n="markets">Рынки</a>
    </nav>
  </header>

  <main class="wrap marketsWrap">
    <section class="hero marketHero">
      <div>
        <div class="eyebrow" data-i18n="marketBrand">Market comparison</div>
        <h1 data-i18n="marketTitle">Бали vs Дубай vs Пхукет vs Батуми</h1>
        <p data-i18n="marketText">Визуальная страница для разговора с клиентом, который выбирает страну для инвестиций. Русская версия адаптирована под продажу, английская — для международного клиента.</p>
      </div>
      <div class="heroActions">
        <button class="ghost" onclick="document.getElementById('marketMatrix').scrollIntoView({behavior:'smooth'})" data-i18n="compareTable">Сравнить таблицей</button>
        <button class="primary" onclick="window.print()" data-i18n="downloadPdf">Скачать PDF / Печать</button>
      </div>
    </section>

    <section id="marketApp"></section>
  </main>

  <script src="assets/js/data.js?v=15"></script>
  <script src="assets/js/i18n.js?v=15"></script>
  <script src="assets/js/markets.js?v=15"></script>

</html>
